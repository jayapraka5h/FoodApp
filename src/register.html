<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a FoodApp account and start ordering your favourite food.">
    <title>Create Account — FoodApp</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍔</text></svg>">
    <script>
        if (localStorage.getItem('foodapp_theme') === 'light') {
            document.documentElement.classList.add('light-theme');
        }
    </script>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card" style="max-width:520px;">

            <!-- ─── Logo ─────────────────────────────────────────────── -->
            <div class="auth-logo">
                <a href="../index.html" style="text-decoration:none;">
                    <span class="logo-icon">🍕</span>
                </a>
                <h2>Join FoodApp</h2>
                <p>Create your free account in seconds</p>
            </div>

            <!-- ─── Error Message ─────────────────────────────────────── -->
            <div id="alert-container"></div>

            <!-- ─── Register Form ─────────────────────────────────────── -->
            <form id="registerForm" onsubmit="handleRegisterSubmit(event)">

                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <div class="form-input-icon">
                        <span class="icon">👤</span>
                        <input
                            type="text"
                            id="name"
                            name="name"
                            class="form-input"
                            placeholder="John Doe"
                            required
                            autocomplete="name"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <div class="form-input-icon">
                        <span class="icon">📧</span>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="form-input"
                            placeholder="you@example.com"
                            required
                            autocomplete="email"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="form-input-icon">
                        <span class="icon">🔒</span>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-input"
                            placeholder="Minimum 6 characters"
                            required
                            minlength="6"
                            autocomplete="new-password"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="phone">Phone Number</label>
                    <div class="form-input-icon">
                        <span class="icon">📞</span>
                        <input
                            type="tel"
                            id="phone"
                            name="phone"
                            class="form-input"
                            placeholder="+91 98765 43210"
                            required
                            autocomplete="tel"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="address">Delivery Address</label>
                    <div class="form-input-icon">
                        <span class="icon" style="top:18px;">📍</span>
                        <textarea
                            id="address"
                            name="address"
                            class="form-input"
                            placeholder="123 Main Street, City, State - PIN"
                            rows="3"
                            required
                            style="resize:vertical; padding-left:42px; padding-top:13px;"
                        ></textarea>
                    </div>
                </div>

                <div style="margin-top:1.5rem;">
                    <button type="submit" class="btn btn-primary" style="width:100%;">
                        🎉 Create Account
                    </button>
                </div>

            </form>

            <div class="auth-footer">
                Already have an account?
                <a href="login.html" style="font-weight:600;">Sign in →</a>
            </div>

        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        // Check if already logged in
        if (localStorage.getItem('foodapp_active_user')) {
            window.location.href = 'home.html';
        }

        function handleRegisterSubmit(e) {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            const container = document.getElementById('alert-container');

            // Default seed user check to prevent duplicate email
            const defaultUserEmail = 'mahesh@example.com';
            
            // Fetch existing users from localStorage
            let users = [];
            try {
                const rawUsers = localStorage.getItem('foodapp_users');
                users = rawUsers ? JSON.parse(rawUsers) : [];
            } catch (err) {
                users = [];
            }

            const emailExists = users.some(u => u.email.toLowerCase() === email.toLowerCase()) || 
                                email.toLowerCase() === defaultUserEmail.toLowerCase();

            if (emailExists) {
                container.innerHTML = `
                    <div class="alert alert-error">
                        ⚠️ Email address is already registered.
                    </div>
                `;
                return;
            }

            // Add user
            users.push({ name, email, password, phone, address });
            localStorage.setItem('foodapp_users', JSON.stringify(users));

            // Redirect to login
            window.location.href = 'login.html?registered=true';
        }
    </script>
</body>
</html>
