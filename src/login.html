<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to FoodApp and order from your favourite restaurants.">
    <title>Sign In — FoodApp</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍔</text></svg>">
    <script>
        if (localStorage.getItem('foodapp_theme') === 'light') {
            document.documentElement.classList.add('light-theme');
        }
    </script>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">

            <!-- ─── Logo ─────────────────────────────────────────────── -->
            <div class="auth-logo">
                <a href="../index.html" style="text-decoration:none;">
                    <span class="logo-icon">🍔</span>
                </a>
                <h2>Welcome Back!</h2>
                <p>Sign in to continue ordering</p>
            </div>

            <!-- ─── Error / Success Messages ─────────────────────────── -->
            <div id="alert-container"></div>

            <!-- ─── Login Form ────────────────────────────────────────── -->
            <form id="loginForm" onsubmit="handleLoginSubmit(event)">

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <div class="form-input-icon">
                        <span class="icon">📧</span>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="form-input"
                            placeholder="you@example.com"
                            required
                            autocomplete="email"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="form-input-icon">
                        <span class="icon">🔒</span>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-input"
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                        >
                    </div>
                </div>

                <div style="margin-top:1.5rem;">
                    <button type="submit" class="btn btn-primary" style="width:100%;">
                        🚀 Sign In
                    </button>
                </div>

            </form>

            <div class="auth-footer">
                Don't have an account?
                <a href="register.html" style="font-weight:600;">Create one free →</a>
            </div>

        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        // Check if already logged in
        if (localStorage.getItem('foodapp_active_user')) {
            window.location.href = 'home.html';
        }

        // Show registration success message if redirected from register.html
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('registered') === 'true') {
                const container = document.getElementById('alert-container');
                container.innerHTML = `
                    <div class="alert alert-success">
                        ✅ Account created successfully! Please sign in.
                    </div>
                `;
                // Auto hide alert
                setTimeout(() => {
                    const alert = container.querySelector('.alert');
                    if (alert) {
                        alert.style.transition = 'opacity 0.5s ease';
                        alert.style.opacity = '0';
                        setTimeout(() => alert.remove(), 500);
                    }
                }, 5000);
            }
        });

        // Form submission handler
        function handleLoginSubmit(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const container = document.getElementById('alert-container');

            // Default seed user for testing
            const defaultUser = {
                name: 'Mahesh Kumar',
                email: 'mahesh@example.com',
                password: 'password123',
                phone: '+91 98765 43210',
                address: '123 Main Street, Koramangala, Bangalore - 560034'
            };

            // Get registered users from localStorage
            let users = [];
            try {
                const rawUsers = localStorage.getItem('foodapp_users');
                users = rawUsers ? JSON.parse(rawUsers) : [];
            } catch (err) {
                users = [];
            }

            // Find user
            let user = users.find(u => u.email.toLowerCase() === email.toLowerCase());
            
            // Fallback to default user if email matches
            if (!user && email.toLowerCase() === defaultUser.email.toLowerCase()) {
                user = defaultUser;
            }

            if (user && user.password === password) {
                // Set active user session
                localStorage.setItem('foodapp_active_user', JSON.stringify({
                    name: user.name,
                    email: user.email,
                    phone: user.phone,
                    address: user.address
                }));
                window.location.href = 'home.html';
            } else {
                container.innerHTML = `
                    <div class="alert alert-error">
                        ⚠️ Invalid email or password. Use mahesh@example.com / password123 to log in.
                    </div>
                `;
                // Auto hide alert
                setTimeout(() => {
                    const alert = container.querySelector('.alert');
                    if (alert) {
                        alert.style.transition = 'opacity 0.5s ease';
                        alert.style.opacity = '0';
                        setTimeout(() => alert.remove(), 500);
                    }
                }, 5000);
            }
        }
    </script>
</body>
</html>
